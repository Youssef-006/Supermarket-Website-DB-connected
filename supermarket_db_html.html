<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Database Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom right, #0f172a, #1e3a8a, #0f172a);
            min-height: 100vh;
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="text-gray-100">
    <div id="app"></div>

    <script>
        // Database state
        let state = {
            activeTab: 'customers',
            isAdding: false,
            formData: {},
            customers: [
                { Customer_ID: 1000, FirstName: 'Ahmed', MiddleName: 'Mohamed', LastName: 'Ali', Customer_email: 'ahmed.ali@gmail.com', BirthDay: '1990-05-15', Gender: 'M', Customer_Street: 'Nasr City Street 10', Customer_ZipCode: '11371', Customer_City: 'Cairo' }
            ],
            products: [
                { Product_ID: 100, Product_name: 'Fresh Milk', UnitPrice: 65.50, Category: 'Dairy', StockQuantity: 150, Sub_Category: 'Milk', ExpireDate: '2024-03-15' }
            ],
            orders: [
                { Order_ID: 1600, TotalAmount: 125.75, PaymentMethod: 'Credit Card', Order_Date: '2024-01-15', Customer_ID: 1000, Delivery_ID: 1500, Cashier_ID: 1 }
            ],
            suppliers: [
                { Supplier_ID: 200, Supplier_name: 'Fresh Foods Egypt', Rating: 5, Supplier_email: 'freshfoodsegypt@gmail.com', Supplier_city: 'Cairo', Supplier_country: 'Egypt', Supplier_street: 'Nasr City Street 15' }
            ],
            cashiers: [
                { Cashier_ID: 1, Cashier_Address: 'Cairo, Nasr City, Street 1', Cashier_Gender: 'M', Fname: 'Ahmed', Minit: 'M', Lname: 'Ali', Salary: 8500.00, Hourly_Pay: 12.50, Cashier_BirthDate: '1990-05-15', Cashier_Email: 'ahmed.ali@gmail.com' }
            ],
            deliveries: [
                { Delivery_ID: 1500, Delivery_Name: 'Mohamed Delivery', Delivery_Address: 'Cairo, Nasr City', Delivery_Status: 'Delivered', Delivery_Time: '2024-01-15 14:30:00' }
            ],
            discounts: [
                { Discount_ID: 1, Discount_Type: 'percentage', StartDate: '2024-01-01', Discount_Value: 15.00, EndDate: '2024-01-31', Order_ID: 1600 }
            ]
        };

        // Icons as SVG
        const icons = {
            Database: '<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>',
            Users: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>',
            Package: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>',
            ShoppingCart: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>',
            Truck: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>',
            MapPin: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>',
            UserCheck: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>',
            Percent: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>'
        };

        const tabs = [
            { id: 'customers', label: 'Customers', icon: 'Users' },
            { id: 'products', label: 'Products', icon: 'Package' },
            { id: 'orders', label: 'Orders', icon: 'ShoppingCart' },
            { id: 'suppliers', label: 'Suppliers', icon: 'Truck' },
            { id: 'cashiers', label: 'Cashiers', icon: 'UserCheck' },
            { id: 'deliveries', label: 'Deliveries', icon: 'MapPin' },
            { id: 'discounts', label: 'Discounts', icon: 'Percent' }
        ];

        const fields = {
            customers: [
                { name: 'Customer_ID', label: 'Customer ID', type: 'number' },
                { name: 'FirstName', label: 'First Name', type: 'text' },
                { name: 'MiddleName', label: 'Middle Name', type: 'text' },
                { name: 'LastName', label: 'Last Name', type: 'text' },
                { name: 'Customer_email', label: 'Email', type: 'email' },
                { name: 'BirthDay', label: 'Birthday', type: 'date' },
                { name: 'Gender', label: 'Gender', type: 'select', options: ['M', 'F'] },
                { name: 'Customer_Street', label: 'Street', type: 'text' },
                { name: 'Customer_ZipCode', label: 'Zip Code', type: 'text' },
                { name: 'Customer_City', label: 'City', type: 'text' }
            ],
            products: [
                { name: 'Product_ID', label: 'Product ID', type: 'number' },
                { name: 'Product_name', label: 'Product Name', type: 'text' },
                { name: 'UnitPrice', label: 'Unit Price (EGP)', type: 'number', step: '0.01' },
                { name: 'Category', label: 'Category', type: 'text' },
                { name: 'StockQuantity', label: 'Stock Quantity', type: 'number' },
                { name: 'Sub_Category', label: 'Sub Category', type: 'text' },
                { name: 'ExpireDate', label: 'Expire Date', type: 'date' }
            ],
            orders: [
                { name: 'Order_ID', label: 'Order ID', type: 'number' },
                { name: 'TotalAmount', label: 'Total Amount (EGP)', type: 'number', step: '0.01' },
                { name: 'PaymentMethod', label: 'Payment Method', type: 'select', options: ['Cash', 'Credit Card', 'Debit Card', 'Mobile Payment'] },
                { name: 'Order_Date', label: 'Order Date', type: 'date' },
                { name: 'Customer_ID', label: 'Customer ID', type: 'number' },
                { name: 'Delivery_ID', label: 'Delivery ID', type: 'number' },
                { name: 'Cashier_ID', label: 'Cashier ID', type: 'number' }
            ],
            suppliers: [
                { name: 'Supplier_ID', label: 'Supplier ID', type: 'number' },
                { name: 'Supplier_name', label: 'Supplier Name', type: 'text' },
                { name: 'Rating', label: 'Rating (1-5)', type: 'number', min: 1, max: 5 },
                { name: 'Supplier_email', label: 'Email', type: 'email' },
                { name: 'Supplier_city', label: 'City', type: 'text' },
                { name: 'Supplier_country', label: 'Country', type: 'text' },
                { name: 'Supplier_street', label: 'Street', type: 'text' }
            ],
            cashiers: [
                { name: 'Cashier_ID', label: 'Cashier ID', type: 'number' },
                { name: 'Fname', label: 'First Name', type: 'text' },
                { name: 'Minit', label: 'Middle Initial', type: 'text', maxLength: 1 },
                { name: 'Lname', label: 'Last Name', type: 'text' },
                { name: 'Cashier_Gender', label: 'Gender', type: 'select', options: ['M', 'F'] },
                { name: 'Hourly_Pay', label: 'Hourly Pay (11-15 EGP)', type: 'number', step: '0.01', min: 11, max: 15 },
                { name: 'Cashier_BirthDate', label: 'Birth Date', type: 'date' },
                { name: 'Cashier_Email', label: 'Email', type: 'email' },
                { name: 'Cashier_Address', label: 'Address', type: 'text' }
            ],
            deliveries: [
                { name: 'Delivery_ID', label: 'Delivery ID', type: 'number' },
                { name: 'Delivery_Name', label: 'Delivery Name', type: 'text' },
                { name: 'Delivery_Address', label: 'Delivery Address', type: 'text' },
                { name: 'Delivery_Status', label: 'Status', type: 'select', options: ['Pending', 'In Transit', 'Delivered'] },
                { name: 'Delivery_Time', label: 'Delivery Time', type: 'datetime-local' }
            ],
            discounts: [
                { name: 'Discount_ID', label: 'Discount ID', type: 'number' },
                { name: 'Discount_Type', label: 'Type', type: 'select', options: ['percentage', 'fixed amount', 'coupon'] },
                { name: 'Discount_Value', label: 'Value', type: 'number', step: '0.01' },
                { name: 'StartDate', label: 'Start Date', type: 'date' },
                { name: 'EndDate', label: 'End Date', type: 'date' },
                { name: 'Order_ID', label: 'Order ID', type: 'number' }
            ]
        };

        function getIdField(tab) {
            const mapping = {
                customers: 'Customer_ID',
                products: 'Product_ID',
                orders: 'Order_ID',
                suppliers: 'Supplier_ID',
                cashiers: 'Cashier_ID',
                deliveries: 'Delivery_ID',
                discounts: 'Discount_ID'
            };
            return mapping[tab];
        }

        function handleAdd() {
            const newItem = { ...state.formData };
            
            if (state.activeTab === 'cashiers' && state.formData.Hourly_Pay) {
                newItem.Salary = parseFloat(state.formData.Hourly_Pay) * 8 * 30;
            }
            
            state[state.activeTab].push(newItem);
            state.formData = {};
            state.isAdding = false;
            render();
        }

        function handleDelete(id) {
            const idField = getIdField(state.activeTab);
            state[state.activeTab] = state[state.activeTab].filter(item => item[idField] !== id);
            render();
        }

        function updateFormData(field, value) {
            state.formData[field] = value;
            render();
        }

        function setActiveTab(tab) {
            state.activeTab = tab;
            state.isAdding = false;
            state.formData = {};
            render();
        }

        function toggleAdding() {
            state.isAdding = !state.isAdding;
            if (!state.isAdding) state.formData = {};
            render();
        }

        function render() {
            const activeData = state[state.activeTab];
            const activeFields = fields[state.activeTab];
            const idField = getIdField(state.activeTab);

            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="min-h-screen">
                    <!-- Header -->
                    <div class="bg-slate-800/90 backdrop-blur-sm border-b border-blue-500/30 shadow-2xl">
                        <div class="max-w-7xl mx-auto px-6 py-4">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="text-blue-400">${icons.Database}</div>
                                    <div>
                                        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                                            Supermarket Database Manager
                                        </h1>
                                        <p class="text-xs text-gray-400 mt-0.5">FreeSql Compatible System</p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-3">
                                    <div class="flex items-center space-x-2 text-sm text-gray-400">
                                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                        <span>Oracle DB Connected</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="max-w-7xl mx-auto px-6 py-8">
                        <!-- Navigation Tabs -->
                        <div class="flex flex-wrap gap-2 mb-8 bg-slate-800/60 backdrop-blur-sm p-2 rounded-xl border border-blue-500/20">
                            ${tabs.map(tab => `
                                <button
                                    onclick="setActiveTab('${tab.id}')"
                                    class="flex items-center space-x-2 px-4 py-2.5 rounded-lg transition-all font-medium ${
                                        state.activeTab === tab.id
                                            ? 'bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg shadow-blue-500/30'
                                            : 'text-gray-400 hover:bg-slate-700/50 hover:text-gray-200'
                                    }"
                                >
                                    <div>${icons[tab.icon]}</div>
                                    <span>${tab.label}</span>
                                </button>
                            `).join('')}
                        </div>

                        <!-- Add Button -->
                        <div class="mb-6">
                            <button
                                onclick="toggleAdding()"
                                class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-6 py-2.5 rounded-lg transition-all shadow-lg shadow-green-500/30 flex items-center space-x-2 font-medium"
                            >
                                <span class="text-xl">+</span>
                                <span>Add New ${state.activeTab.slice(0, -1).charAt(0).toUpperCase() + state.activeTab.slice(1, -1)}</span>
                            </button>
                        </div>

                        <!-- Add Form -->
                        ${state.isAdding ? `
                            <div class="bg-slate-800/60 backdrop-blur-sm rounded-xl p-6 mb-6 border border-blue-500/20 shadow-2xl">
                                <h3 class="text-lg font-semibold mb-4 text-blue-400">Add New Entry</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    ${activeFields.map(field => `
                                        <div>
                                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                                ${field.label}
                                            </label>
                                            ${field.type === 'select' ? `
                                                <select
                                                    onchange="updateFormData('${field.name}', this.value)"
                                                    class="w-full bg-slate-700/50 border border-blue-500/20 rounded-lg px-3 py-2 text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                                >
                                                    <option value="">Select ${field.label}</option>
                                                    ${field.options.map(opt => `
                                                        <option value="${opt}" ${state.formData[field.name] === opt ? 'selected' : ''}>${opt}</option>
                                                    `).join('')}
                                                </select>
                                            ` : `
                                                <input
                                                    type="${field.type}"
                                                    value="${state.formData[field.name] || ''}"
                                                    onchange="updateFormData('${field.name}', this.value)"
                                                    ${field.step ? `step="${field.step}"` : ''}
                                                    ${field.min ? `min="${field.min}"` : ''}
                                                    ${field.max ? `max="${field.max}"` : ''}
                                                    ${field.maxLength ? `maxlength="${field.maxLength}"` : ''}
                                                    class="w-full bg-slate-700/50 border border-blue-500/20 rounded-lg px-3 py-2 text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                                    placeholder="Enter ${field.label.toLowerCase()}"
                                                />
                                            `}
                                        </div>
                                    `).join('')}
                                </div>
                                ${state.activeTab === 'cashiers' && state.formData.Hourly_Pay ? `
                                    <div class="mt-4 p-3 bg-blue-900/30 border border-blue-500/30 rounded-lg">
                                        <p class="text-sm text-blue-300">
                                            <strong>Calculated Salary:</strong> ${(parseFloat(state.formData.Hourly_Pay) * 8 * 30).toFixed(2)} EGP/month
                                            <span class="text-xs ml-2 text-gray-400">(Hourly Pay × 8 hours × 30 days)</span>
                                        </p>
                                    </div>
                                ` : ''}
                                <div class="flex space-x-3 mt-6">
                                    <button
                                        onclick="handleAdd()"
                                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-colors font-medium"
                                    >
                                        Save
                                    </button>
                                    <button
                                        onclick="toggleAdding()"
                                        class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg transition-colors font-medium"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        ` : ''}

                        <!-- Data Table -->
                        <div class="bg-slate-800/60 backdrop-blur-sm rounded-xl overflow-hidden border border-blue-500/20 shadow-2xl">
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-slate-900/80">
                                        <tr>
                                            ${activeFields.map(field => `
                                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider whitespace-nowrap">
                                                    ${field.label}
                                                </th>
                                            `).join('')}
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-700/50">
                                        ${activeData.map(item => `
                                            <tr class="hover:bg-slate-700/30 transition-colors">
                                                ${activeFields.map(field => `
                                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">
                                                        ${item[field.name] || '-'}
                                                    </td>
                                                `).join('')}
                                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                    <button
                                                        onclick="handleDelete(${item[idField]})"
                                                        class="text-red-400 hover:text-red-300 transition-colors font-medium"
                                                    >
                                                        Delete
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Stats Footer -->
                        <div class="mt-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                            ${tabs.map(tab => {
                                const count = state[tab.id].length;
                                const colors = {
                                    customers: 'text-blue-400',
                                    products: 'text-green-400',
                                    orders: 'text-purple-400',
                                    suppliers: 'text-yellow-400',
                                    cashiers: 'text-cyan-400',
                                    deliveries: 'text-pink-400',
                                    discounts: 'text-orange-400'
                                };
                                return `
                                    <div class="bg-slate-800/60 backdrop-blur-sm rounded-lg p-4 border border-blue-500/20">
                                        <div class="flex items-center justify-between mb-2">
                                            <span class="text-gray-400 text-xs">${tab.label}</span>
                                            <div class="${colors[tab.id]}">${icons[tab.icon]}</div>
                                        </div>
                                        <p class="text-2xl font-bold">${count}</p>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // Initial render
        render();
    </script>
</body>
</html>
